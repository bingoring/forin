root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/main"
  cmd = "go build -o ./tmp/main ./cmd/api/main.go"
  delay = 1000
  exclude_dir = ["tmp", "vendor", "migrations", "scripts"]
  exclude_regex = ["_test.go"]
  include_ext = ["go", "env"]
  kill_delay = "0s"
  log = "build-errors.log"
  send_interrupt = false
  stop_on_error = true

[log]
  time = true

[color]
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"
